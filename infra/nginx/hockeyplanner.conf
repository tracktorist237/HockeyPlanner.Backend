server {
    listen 80;
    server_name hockeyplanner.ru www.hockeyplanner.ru api.hockeyplanner.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hockeyplanner.ru www.hockeyplanner.ru;

    ssl_certificate /etc/letsencrypt/live/hockeyplanner.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hockeyplanner.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /asset-manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }
}

server {
    listen 443 ssl;
    server_name api.hockeyplanner.ru;

    ssl_certificate /etc/letsencrypt/live/hockeyplanner.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hockeyplanner.ru/privkey.pem;

    location / {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}